title: USMLE Reasoning Lab
description: >-
  Companion transcripts, quick answers, and Q&A for USMLE Reasoning Lab —
  original USMLE teaching questions worked one clue at a time.
author: Wenchang Yue, MD, PhD
lang: en
url: "https://wenchangyue.github.io"
baseurl: "/usmle-reasoning-lab"
youtube_channel: "https://www.youtube.com/@USMLEReasoningLab"
repository_url: "https://github.com/wenchangyue/usmle-reasoning-lab"

collections:
  episodes:
    output: true
    permalink: /ep/:name/

defaults:
  - scope:
      path: ""
      type: episodes
    values:
      layout: episode

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - TEMPLATE-episode.md
